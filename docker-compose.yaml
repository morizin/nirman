version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: roadvision-backend:latest
    container_name: roadvision-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount from the backend subfolder (where the actual data lives)
      - ./backend/uploads:/app/uploads
      - ./backend/models:/app/models
    environment:
      STREAM_FPS: "25"
      INFERENCE_SKIP: "2"     # Run inference every 2nd frame → ~12 inferences/s at 25 fps
      JPEG_QUALITY: "100"
      THUMB_QUALITY: "80"
      CONFIDENCE_THRESHOLD: "0.2"
      PORT: "8000"
      NMS_THRESHOLD: "0.3"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "2G"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: nginx:alpine
    container_name: roadvision-frontend
    ports:
      - "3000:80"
    volumes:
      # index.html lives at project root — mounted read-only
      - ./index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped